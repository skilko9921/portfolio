<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RXDev | Motion Specialist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050505; 
            color: white; 
            overflow-x: hidden;
            cursor: none; /* Hides default cursor for our custom one */
        }

        /* Custom Cursor */
        #cursor {
            width: 20px;
            height: 20px;
            background: #3b82f6;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            box-shadow: 0 0 15px #3b82f6, 0 0 30px #3b82f6;
        }

        /* 3D Card Animation */
        .tilt-card {
            perspective: 1000px;
            transition: transform 0.5s ease;
        }
        .tilt-card-inner {
            transition: transform 0.5s shadow 0.5s;
            transform-style: preserve-3d;
        }
        .tilt-card:hover .tilt-card-inner {
            transform: rotateY(10deg) rotateX(5deg) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.5);
        }

        /* Background Motion Blur */
        .blur-circle {
            position: fixed;
            width: 400px;
            height: 400px;
            background: rgba(59, 130, 246, 0.2);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <div class="blur-circle top-0 left-0"></div>
    <div class="blur-circle bottom-0 right-0" style="background: rgba(168, 85, 247, 0.15); animation-delay: -5s;"></div>

    <nav class="max-w-6xl mx-auto px-6 py-8 flex justify-between items-center relative z-10">
        <div class="flex items-center gap-3">
            <img src="RXDevPFP.png" alt="RXDev" class="w-10 h-10 rounded-full border border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.6)]">
            <div class="text-2xl font-black tracking-tighter uppercase">RX<span class="text-blue-500">Dev</span></div>
        </div>
        <div class="text-xs font-bold text-gray-500 tracking-[0.2em]">ANIMATOR & UI DESIGNER</div>
    </nav>

    <header class="max-w-6xl mx-auto px-6 pt-24 pb-32">
        <h1 class="text-7xl md:text-9xl font-black tracking-tighter leading-none">
            PURE <br><span class="text-blue-500 italic">MOTION.</span>
        </h1>
    </header>

    <section class="max-w-6xl mx-auto px-6 pb-40 grid grid-cols-1 md:grid-cols-2 gap-12">
        
        <div class="tilt-card">
            <div class="tilt-card-inner bg-zinc-900/50 border border-white/10 rounded-[2.5rem] overflow-hidden p-4 backdrop-blur-md">
                <img src="GFX-Girl.png" class="w-full aspect-video object-cover rounded-[1.8rem] mb-6">
                <div class="px-4 pb-4">
                    <h3 class="text-2xl font-extrabold italic uppercase">Character GFX</h3>
                    <p class="text-blue-400 text-sm font-bold tracking-widest mt-1">CINEMATIC LIGHTING</p>
                </div>
            </div>
        </div>

        <div class="tilt-card">
            <div class="tilt-card-inner bg-zinc-900/50 border border-white/10 rounded-[2.5rem] overflow-hidden p-4 backdrop-blur-md">
                <img src="GFX-icon.png" class="w-full aspect-video object-cover rounded-[1.8rem] mb-6">
                <div class="px-4 pb-4">
                    <h3 class="text-2xl font-extrabold italic uppercase">Game Branding</h3>
                    <p class="text-blue-400 text-sm font-bold tracking-widest mt-1">UI & ICONOGRAPHY</p>
                </div>
            </div>
        </div>

    </section>

    <footer class="text-center pb-20 opacity-50 text-sm tracking-widest uppercase">
        © 2024 RXDev Portfolio • Stay Creative
    </footer>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Add "Scale Up" effect on links
        document.querySelectorAll('a, .tilt-card').forEach(item => {
            item.addEventListener('mouseenter', () => cursor.style.transform = 'scale(2.5)');
            item.addEventListener('mouseleave', () => cursor.style.transform = 'scale(1)');
        });
    </script>

</body>
</html>
