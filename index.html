<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RXDev | GFX & UI Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030303; color: white; cursor: none; overflow-x: hidden; }
        
        #cursor-outline {
            width: 35px; height: 35px; border: 2px solid #ff00ff;
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.4);
        }

        .reveal { opacity: 0; transform: translateY(30px); }

        .card { 
            background: #0a0a0a; 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
            transform-style: preserve-3d;
            perspective: 1000px;
        }
        
        .card:hover { 
            border-color: #ff00ff; 
            box-shadow: 0 0 40px rgba(191, 0, 255, 0.25); 
        }

        .social-btn { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        
        .social-btn:hover { 
            background: linear-gradient(90deg, #ff00ff, #bf00ff);
            color: white; 
            transform: scale(1.1) translateY(-3px); 
            border-color: #ff00ff;
        }

        .glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--x) var(--y), rgba(191, 0, 255, 0.1) 0%, transparent 40%);
            z-index: -1; pointer-events: none;
        }

        /* FIX: Added padding-right and padding-left so italics don't cut */
        .text-neon {
            background: linear-gradient(90deg, #ff00ff, #bf00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            padding-right: 20px; 
            margin-right: -20px;
        }

        /* FIX: Added horizontal padding to the title container */
        .hero-title {
            font-size: clamp(3rem, 12vw, 8.5rem);
            line-height: 0.9;
            padding-left: 5px;
            padding-right: 25px;
            width: fit-content;
        }
    </style>
</head>
<body>

    <div id="cursor-outline"></div>
    <div class="glow"></div>

    <nav class="max-w-6xl mx-auto px-6 py-10 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <img src="RXDevPFP.png" class="w-12 h-12 rounded-full border-2 border-[#ff00ff] shadow-[0_0_15px_rgba(255,0,255,0.5)]">
            <h1 class="text-3xl font-black italic tracking-tighter pr-4">RX<span class="text-neon">DEV</span></h1>
        </div>
        <div class="text-[10px] font-bold text-gray-500 tracking-[0.3em] uppercase">UI Designer</div>
    </nav>

    <main class="max-w-6xl mx-auto px-6">
        
        <header class="py-16 md:py-24">
            <h1 id="hero-text" class="hero-title font-black italic uppercase tracking-tighter pr-10">
                Roblox <br> <span class="text-neon">Developer</span>
            </h1>
            
            <div class="mt-12 flex flex-wrap gap-4 reveal">
                <a href="https://x.com/rxdev_yt_" target="_blank" class="social-btn px-6 py-3 rounded-xl font-bold text-sm uppercase italic">Twitter / X</a>
                <a href="https://www.youtube.com/@RXDev_Studio" target="_blank" class="social-btn px-6 py-3 rounded-xl font-bold text-sm uppercase italic">YouTube</a>
                <a href="https://www.roblox.com/users/2043222762/profile" target="_blank" class="social-btn px-6 py-3 rounded-xl font-bold text-sm uppercase italic">Roblox</a>
                <div class="px-6 py-3 rounded-xl font-bold text-sm uppercase italic bg-purple-600/10 border border-purple-500/30 text-pink-400">Discord: rxdev_yt</div>
            </div>
        </header>

        <section class="mb-32">
            <h3 class="text-xs font-bold tracking-[0.4em] text-gray-500 uppercase mb-8 reveal italic">Featured Thumbnails</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="card rounded-[2rem] overflow-hidden reveal hover-tilt">
                    <img src="EarnsOffline.png" class="w-full aspect-video object-cover">
                </div>
                <div class="card rounded-[2rem] overflow-hidden reveal hover-tilt">
                    <img src="farmer.png" class="w-full aspect-video object-cover">
                </div>
                <div class="card rounded-[2rem] overflow-hidden reveal hover-tilt">
                    <img src="idk (1).png" class="w-full aspect-video object-cover">
                </div>
            </div>
        </section>

        <section class="mb-32">
            <h3 class="text-xs font-bold tracking-[0.4em] text-gray-500 uppercase mb-8 reveal italic text-right">GFX Profile Pictures</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6 reveal">
                <div class="card rounded-3xl aspect-square overflow-hidden hover-tilt"><img src="GFX-Girl.png" class="w-full h-full object-cover"></div>
                <div class="card rounded-2xl aspect-square overflow-hidden hover-tilt"><img src="image_75 (5).png" class="w-full h-full object-cover"></div>
                <div class="card rounded-3xl aspect-square overflow-hidden hover-tilt"><img src="Fan1 (13).png" class="w-full h-full object-cover"></div>
                <div class="card rounded-3xl aspect-square overflow-hidden hover-tilt"><img src="Fan1 (9).png" class="w-full h-full object-cover"></div>
            </div>
        </section>

    </main>

    <script>
        const outline = document.getElementById('cursor-outline');

        window.addEventListener('mousemove', (e) => {
            gsap.to(outline, { x: e.clientX - 17, y: e.clientY - 17, duration: 0.6, ease: "power3.out" });
            document.body.style.setProperty('--x', e.clientX + 'px');
            document.body.style.setProperty('--y', e.clientY + 'px');
        });

        document.querySelectorAll('.hover-tilt').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const xc = rect.width / 2;
                const yc = rect.height / 2;
                const dx = x - xc;
                const dy = y - yc;

                gsap.to(card, {
                    rotationY: dx / 10,
                    rotationX: -dy / 10,
                    ease: "power3.out",
                    duration: 0.5
                });
            });

            card.addEventListener('mouseleave', () => {
                gsap.to(card, { rotationY: 0, rotationX: 0, ease: "elastic.out(1, 0.3)", duration: 1.5 });
            });
        });

        gsap.to(".reveal", { opacity: 1, y: 0, duration: 1.5, stagger: 0.15, ease: "expo.out", delay: 0.5 });

        gsap.from("#hero-text", { y: 50, opacity: 0, duration: 1.8, ease: "power4.out", delay: 0.2 });

        gsap.to(".hover-tilt", {
            y: "-=10", duration: 2, ease: "sine.inOut", repeat: -1, yoyo: true, 
            stagger: { each: 0.2, from: "random" }
        });
    </script>
</body>
</html>
